# Curved and perpendicular belt interactions

- name: Perpendicular belt
  before: _ _ ^
  after: "> >i ^ >o >"

- name: Multiple perpendicular belts
  before: _ _ ^ v
  after: "> >i ^ v >o >"

- name: Backwards curved belt
  before: |
    _ _ v
    _ _ <
  after: |
    _ _  v _
    > >i < >o >
  not_reversible: true

- name: Forwards curved belt
  before: |
    _ _ v
    _ _ >
  after: |
    _ _  v _
    > >i > >o >
  not_reversible: true

- name: Forwards curved belt continuation
  before: |
    _ _ v
    _ _ > >
  after: |
    _ _  v _
    > >i > > >o >

- name: Backwards curved belt continuation
  before: |
    _ _ v
    _ < <
  after: |
    _  _ v _
    >i < < >o >

- name: Forwards curved belt continuation too long
  before: |
    _ _ v
    _ _ > > > > >
  after: |
    _ _ v   _
    > > > > > > > *>
  after_for_reverse: |
    _ _ v   _
    > > v > > > > *>
  expected_errors: [too_far_to_connect]

- name: Backwards curved belt continuation too long
  before: |
    _ _ _ _ _ v
    _ < < < < <
  after: |
    _ _ _ _ _ v
    > > > > > < *>
  expected_errors: [belt_line_broken]

- name: Two backwards curved belts
  before: |
    _ _ ^ v
    _ _ ^ <
  after: |
    _ _  ^ v _
    > >i ^ < >o >

- name: Two forwards curved belts
  before: |
    _ _ v ^
    _ _ > ^
  after: |
    _ _  v ^ _
    > >i > ^ >o >

