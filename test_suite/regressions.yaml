# Regression tests found by fuzzer

- name: Underground from error state preserves curvature
  before: |
    > ^ v <o
  after: |
    > ^ v <o *>
  expected_errors: [belt_line_broken]
  not_reversible: true

- name: Excluded belt curvature preserved from right
  before: |
    _ v
    _ > ^ <
  after: |
    _ v
    >i > ^ < >o
  not_reversible: true
