- name: Can enter loader
  before: "_ >I"
  after: "> >I"

- name: Can underground over wrong direction loaders
  before: "_ <O _ _ ^I _ _ <I"
  after: ">i <O >o >i ^I >o >i <I >o"

- name: Cannot traverse past loader
  before: "_ >I"
  after: "> >I *>"
  expected_errors: [belt_line_broken]

- name: Belt segments after loader are obstacles 1
  before: "_ >O > _"
  after: ">i >O > >o"

- name: Belt segments after loader are obstacles 2
  before: "_ <I < _"
  after: ">i <I < >o"

- name: Underground output to backwards loader
  before: |
    _ 2<i < <O
  after: |
    >i 2<i < <O >o

- name: Backwards segment ending in loader
  before: |
    _ < < <O
  after: |
    >i < < <O >o

- name: Backwards segment ending in unconnected loader input
  before: |
    _ < < <I
  after: |
    > > >i <I >o

- name: Backwards segment ending in unconnected loader output
  before: |
    _ < < >O >
  after: |
    > > >i >O > >o
